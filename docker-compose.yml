services:
  # Kafka avec KRaft (sans Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=sentiment-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - indices.query.bool.max_clause_count=10000
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=30s || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Kibana (optionnel pour debug)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Serveur SMTP de test (NOUVEAU)
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"  # Serveur SMTP
      - "8025:8025"  # Interface Web
    restart: unless-stopped

  # Grafana avec configuration SMTP (MODIFIÉ)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Configuration SMTP (NOUVEAU)
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mailhog:1025
      - GF_SMTP_FROM_ADDRESS=alertes@sentiment-analysis.local
      - GF_SMTP_FROM_NAME=Alertes-Sentiment
      - GF_SMTP_SKIP_VERIFY=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - elasticsearch
      - mailhog  # NOUVEAU
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Spark Master (garde pour compatibilité mais pas utilisé en mode local)
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8081
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8081:8081"
      - "7077:7077"
    volumes:
      - ./services/spark-processor:/opt/spark-apps:ro
      - spark_logs:/opt/spark/logs
    restart: unless-stopped

  # Spark Worker (garde pour compatibilité mais pas utilisé en mode local)
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8082
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
    volumes:
      - ./services/spark-processor:/opt/spark-apps:ro
      - spark_logs:/opt/spark/logs
    restart: unless-stopped

  # Tweet Simulator
  tweet-simulator:
    build:
      context: ./services/tweet-simulator
      dockerfile: Dockerfile
    container_name: tweet-simulator
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_TWEETS=raw-tweets
      - TWEET_RATE=60
      - LOG_LEVEL=INFO
      - SIMULATION_MODE=trade_war_escalation 
      - LANGUAGE_MIX=en:0.7,fr:0.3
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./services/tweet-simulator:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('Tweet simulator is running')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Spark Processor (MODE LOCAL - Pas de dépendance vers spark-master)
  spark-processor:
    build:
      context: ./services/spark-processor
      dockerfile: Dockerfile
    container_name: spark-processor
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_TWEETS=raw-tweets
      - KAFKA_TOPIC_PROCESSED=processed-tweets
      - KAFKA_TOPIC_ANOMALIES=anomalies
      - KAFKA_TOPIC_ALERTS=alerts
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - ELASTICSEARCH_INDEX_TWEETS=tweets
      - ELASTICSEARCH_INDEX_ANOMALIES=anomalies
      - SPARK_MASTER_URL=local[*]  # MODE LOCAL
      - SPARK_BATCH_DURATION=5
      - MAX_BATCH_SIZE=1000
      - ENABLE_ANOMALY_DETECTION=true
      - ENABLE_ALERTS=true
      - LOG_LEVEL=INFO
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./services/spark-processor:/opt/spark-apps:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "print('Spark processor is running')"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  # Alert System
  alert-system:
    build:
      context: ./services/alert-system
      dockerfile: Dockerfile
    container_name: alert-system
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_ALERTS=alerts
      - KAFKA_TOPIC_ANOMALIES=anomalies
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
      - ALERT_COOLDOWN_MINUTES=15
      - MAX_ALERTS_PER_HOUR=10
      - ENABLE_EMAIL_ALERTS=false
      - ENABLE_GRAFANA_NOTIFICATIONS=true
      - LOG_LEVEL=INFO
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      grafana:
        condition: service_healthy
    volumes:
      - ./services/alert-system:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('Alert manager is running')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  kafka_data:
    driver: local
  elasticsearch_data:
    driver: local
  grafana_data:
    driver: local
  spark_logs:
    driver: local

networks:
  default:
    name: sentiment-network
    driver: bridge